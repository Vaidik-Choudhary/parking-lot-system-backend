version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: parkease-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - parkease-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: parkease-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: ${RABBIT_MQ:-guest}
    ports:
      - "5673:5672"
      - "15673:15672"
    networks:
      - parkease-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - parkease-network

  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
    depends_on:
      - discovery-service
    networks:
      - parkease-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/parkease_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-parkease_super_secret_key_that_is_long_enough_for_jwt_256_bits}
      PARKEASE_MAIL: ${PARKEASE_MAIL:-dummy_mail}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dummy_client}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-dummy_secret}
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks:
      - parkease-network

  parkinglot-service:
    build: ./parkinglot-service
    container_name: parkinglot-service
    ports:
      - "8082:8082"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/parkease_parkinglot?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-parkease_super_secret_key_that_is_long_enough_for_jwt_256_bits}
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks:
      - parkease-network

  parkingspot-service:
    build: ./parkingspot-service
    container_name: parkingspot-service
    ports:
      - "8083:8083"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/parkease_spot?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-parkease_super_secret_key_that_is_long_enough_for_jwt_256_bits}
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks:
      - parkease-network

  vehicle-service:
    build: ./vehicle-service
    container_name: vehicle-service
    ports:
      - "8084:8084"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/parkease_vehicle?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-parkease_super_secret_key_that_is_long_enough_for_jwt_256_bits}
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks:
      - parkease-network

  booking-service:
    build: ./booking-service
    container_name: booking-service
    ports:
      - "8085:8085"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/parkease_booking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-parkease_super_secret_key_that_is_long_enough_for_jwt_256_bits}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PASSWORD: ${RABBIT_MQ:-guest}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks:
      - parkease-network

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8086:8086"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/parkease_payment?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-parkease_super_secret_key_that_is_long_enough_for_jwt_256_bits}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PASSWORD: ${RABBIT_MQ:-guest}
      RAZORPAY_ID: ${RAZORPAY_ID:-dummy_id}
      RAZORPAY_SECRET: ${RAZORPAY_SECRET:-dummy_secret}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks:
      - parkease-network

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8087:8087"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/parkease_notification?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-parkease_super_secret_key_that_is_long_enough_for_jwt_256_bits}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PASSWORD: ${RABBIT_MQ:-guest}
      PARKEASE_MAIL: ${PARKEASE_MAIL:-dummy_mail}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks:
      - parkease-network

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    ports:
      - "8088:8088"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/parkease_analytics?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-parkease_super_secret_key_that_is_long_enough_for_jwt_256_bits}
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks:
      - parkease-network

  admin-service:
    build: ./admin-service
    container_name: admin-service
    ports:
      - "9091:9090"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
    depends_on:
      discovery-service:
        condition: service_started
    networks:
      - parkease-network

networks:
  parkease-network:
    driver: bridge

volumes:
  mysql-data:
