server.port=8080

spring.application.name=gateway-service
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# AUTH SERVICE
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# BOOKING SERVICE
spring.cloud.gateway.routes[1].id=booking-service
spring.cloud.gateway.routes[1].uri=lb://booking-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/bookings/**,/api/subscriptions/**

# PARKING LOT SERVICE
spring.cloud.gateway.routes[2].id=parkinglot-service
spring.cloud.gateway.routes[2].uri=lb://parkinglot-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/lots/**

# PARKING SPOT SERVICE
spring.cloud.gateway.routes[3].id=parkingspot-service
spring.cloud.gateway.routes[3].uri=lb://parkingspot-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/spots/**

# PAYMENT SERVICE
spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=lb://payment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/payments/**

# VEHICLE SERVICE
spring.cloud.gateway.routes[5].id=vehicle-service
spring.cloud.gateway.routes[5].uri=lb://vehicle-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/vehicles/**

# NOTIFICATION SERVICE
spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=lb://notification-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/notifications/**

# ANALYTICS SERVICE
spring.cloud.gateway.routes[7].id=analytics-service
spring.cloud.gateway.routes[7].uri=lb://analytics-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/analytics/**

# ADMIN ENDPOINTS INSIDE AUTH SERVICE
spring.cloud.gateway.routes[8].id=admin-auth-routes
spring.cloud.gateway.routes[8].uri=lb://auth-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/admin/**

# OAUTH2 ROUTES
spring.cloud.gateway.routes[9].id=oauth2-auth-routes
spring.cloud.gateway.routes[9].uri=lb://auth-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/oauth2/**,/login/oauth2/**

# SUPPORT SERVICE (ADMIN SERVICE)
spring.cloud.gateway.routes[10].id=support-service
spring.cloud.gateway.routes[10].uri=lb://auth-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/support/**

# GLOBAL CORS FOR ALL SERVICES
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# ACTUATOR FOR SPRING BOOT ADMIN
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always